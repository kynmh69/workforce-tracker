version: '3.8'

services:
  postgres:
    image: postgres:17.5
    container_name: workforce-tracker-db
    environment:
      POSTGRES_DB: workforce_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - workforce-tracker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workforce-tracker-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/workforce_tracker?sslmode=disable"
      JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
      PORT: "8080"
    depends_on:
      - postgres
    networks:
      - workforce-tracker-network
    volumes:
      - ./backend:/app
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workforce-tracker-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - backend
    networks:
      - workforce-tracker-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app

volumes:
  postgres_data:

networks:
  workforce-tracker-network:
    driver: bridge